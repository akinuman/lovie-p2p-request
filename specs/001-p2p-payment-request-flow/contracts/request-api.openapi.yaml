openapi: 3.1.0
info:
  title: P2P Payment Request API
  version: 1.0.0
  description: Contract for the take-home P2P payment request flow.
servers:
  - url: https://{host}
    variables:
      host:
        default: example.com
paths:
  /auth/mock-session:
    post:
      summary: Start a mock authenticated session
      operationId: createMockSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMockSessionRequest'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '422':
          description: Invalid identity input
  /requests:
    get:
      summary: List requests for the current user
      operationId: listRequests
      parameters:
        - in: query
          name: direction
          required: true
          schema:
            type: string
            enum: [incoming, outgoing]
      responses:
        '200':
          description: Request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestListResponse'
    post:
      summary: Create a new payment request
      operationId: createRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestRequest'
      responses:
        '201':
          description: Request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequest'
        '422':
          description: Validation failure
  /requests/{requestId}:
    get:
      summary: Get request detail
      operationId: getRequest
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequest'
        '404':
          description: Request not found
  /requests/{requestId}/cancel:
    post:
      summary: Cancel a pending outgoing request
      operationId: cancelRequest
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequest'
        '409':
          description: Request is not cancellable
        '410':
          description: Request already expired
  /requests/{requestId}/decline:
    post:
      summary: Decline a pending incoming request
      operationId: declineRequest
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequest'
        '409':
          description: Request is not declinable
        '410':
          description: Request already expired
  /requests/{requestId}/pay:
    post:
      summary: Simulate payment for a pending incoming request
      operationId: payRequest
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequest'
        '409':
          description: Request is not payable
        '410':
          description: Request already expired
components:
  schemas:
    CreateMockSessionRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
    AuthSessionResponse:
      type: object
      required: [sessionId, user]
      properties:
        sessionId:
          type: string
        user:
          $ref: '#/components/schemas/UserIdentity'
    CreateRequestRequest:
      type: object
      required: [recipientContact, amountCents]
      properties:
        recipientContact:
          type: string
          description: Email or phone number for the intended recipient.
        amountCents:
          type: integer
          minimum: 1
        note:
          type: string
          maxLength: 280
    RequestListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PaymentRequestSummary'
    PaymentRequestSummary:
      type: object
      required:
        [id, amountCents, status, createdAt, expiresAt, shareUrl]
      properties:
        id:
          type: string
        amountCents:
          type: integer
        status:
          $ref: '#/components/schemas/RequestStatus'
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        shareUrl:
          type: string
          format: uri
        counterpartyLabel:
          type: string
    PaymentRequest:
      type: object
      required:
        [id, sender, recipientContact, amountCents, status, shareUrl, createdAt, expiresAt]
      properties:
        id:
          type: string
        sender:
          $ref: '#/components/schemas/UserIdentity'
        recipientContact:
          type: string
        amountCents:
          type: integer
        note:
          type: string
        status:
          $ref: '#/components/schemas/RequestStatus'
        shareUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        declinedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
    UserIdentity:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
    RequestStatus:
      type: string
      enum: [Pending, Paid, Declined, Expired, Cancelled]
